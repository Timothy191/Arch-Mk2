# ──────────────────────────────────────────────────────────────────────────────
# Arch-Mk2 Production Deployment
# ──────────────────────────────────────────────────────────────────────────────
# Single unified compose file for everyday local production use.
#
# Includes: PostgreSQL, Redis, Portal, API, Nginx, Ops-Gateway
# Features: persistent volumes, auto-restart, health checks, resource limits,
#           shared networking, database backups
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#
# Environment file:
#   cp .env.production.example .env.production
#   # Edit .env.production with your secrets
#
# Database backup:
#   docker compose -f docker-compose.production.yml exec postgres backup
#   # Or use: scripts/backup-db.sh
# ──────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart-policy
  restart: unless-stopped

x-healthcheck: &db-healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

services:
  # ── PostgreSQL (primary data store) ─────────────────────────────────────────
  # ── PostgreSQL (optional — used for direct DB access and ops queries) ──────
  # NOTE: The Portal and API use Supabase for their primary database layer.
  # This PostgreSQL instance is available for direct queries, custom analytics,
  # or as a fallback data store. It is NOT required for the app to function.
  postgres:
    <<: *restart-policy
    image: postgres:15-alpine
    container_name: arch-postgres
    shm_size: 256mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-coal_mine}
      PGOPTIONS: "-c effective_cache_size=512MB -c shared_buffers=256MB -c work_mem=16MB"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups:rw
    healthcheck:
      <<: *db-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-coal_mine}"]
    logging: *default-logging
    networks:
      - arch-network
    labels:
      - "arch.service=database"
      - "arch.backup=auto"

  # ── Redis (caching, rate-limiting, queues) ──────────────────────────────────
  redis:
    <<: *restart-policy
    image: redis:7-alpine
    container_name: arch-redis
    command:
      - redis-server
      - --appendonly yes
      - --save 900 1
      - --save 300 10
      - --save 60 10000
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *db-healthcheck
      test: ["CMD", "redis-cli", "ping"]
    logging: *default-logging
    networks:
      - arch-network
    labels:
      - "arch.service=cache"

  # ── Portal (Next.js frontend) ──────────────────────────────────────────────
  portal:
    <<: *restart-policy
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?error}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:?error}
        NEXT_PUBLIC_HIGHLIGHT_PROJECT_ID: ${NEXT_PUBLIC_HIGHLIGHT_PROJECT_ID:-}
        NEXT_PUBLIC_FUXA_URL: ${NEXT_PUBLIC_FUXA_URL:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_VERCEL_ENV: ${NEXT_PUBLIC_VERCEL_ENV:-production}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    container_name: arch-portal
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      SUPABASE_URL: ${SUPABASE_URL:?error}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:?error}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?error}
      REDIS_URL: redis://redis:6379
      API_URL: http://api:3001
      API_BASE_URL: http://api:3001/api
      NEXT_PUBLIC_API_URL: /api
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:5243}
      RATE_LIMIT_IP_WHITELIST: 127.0.0.1,::1,::ffff:127.0.0.1,172.0.0.0/8
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORTAL_PORT:-3000}:3000"
    healthcheck:
      # Portal health check: verify Next.js server is listening on port 3000
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ | grep -qiE '<html|<head|<body|next|__next' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    logging: *default-logging
    networks:
      - arch-network
    labels:
      - "arch.service=portal"
      - "traefik.enable=true"

  # ── API (NestJS backend) ───────────────────────────────────────────────────
  api:
    <<: *restart-policy
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: arch-api
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      SUPABASE_URL: ${SUPABASE_URL:?error}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:?error}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?error}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:?error}
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:5243}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      DISABLE_RATE_LIMIT: ${DISABLE_RATE_LIMIT:-false}
      RATE_LIMIT_IP_WHITELIST: 127.0.0.1,::1,::ffff:127.0.0.1,172.0.0.0/8
      TRUST_PROXY: "true"
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
      SURREALDB_URL: ${SURREALDB_URL:-}
      SURREALDB_NS: ${SURREALDB_NS:-plantcor}
      SURREALDB_DB: ${SURREALDB_DB:-ai}
      SURREALDB_USER: ${SURREALDB_USER:-root}
      SURREALDB_PASS: ${SURREALDB_PASS:-root}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health/live', (r) => { if (r.statusCode !== 200) process.exit(1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    # NOTE: API does NOT depend on the local postgres service.
    # The primary database is Supabase (SUPABASE_URL env var).
    logging: *default-logging
    networks:
      - arch-network
    labels:
      - "arch.service=api"

  # ── Ops-Gateway (MCP Control Plane) ─────────────────────────────────────────
  ops-gateway:
    <<: *restart-policy
    build:
      context: .
      dockerfile: apps/ops-gateway/Dockerfile
    container_name: arch-ops-gateway
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      OPS_API_URL: http://api:3001/api/ops
      MCP_PORT: 3100
    ports:
      - "${OPS_GATEWAY_PORT:-3100}:3100"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    logging: *default-logging
    networks:
      - arch-network
    labels:
      - "arch.service=ops-gateway"

  # ── Nginx (reverse proxy / load balancer) ──────────────────────────────────
  nginx:
    <<: *restart-policy
    image: nginx:alpine
    container_name: arch-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      portal:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      # Check that nginx responds on port 80
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ | grep -qiE '<html|<head|<body|next' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - arch-network
    labels:
      - "arch.service=proxy"

volumes:
  postgres_data:
    name: arch-postgres-data
    external: false
  redis_data:
    name: arch-redis-data
    external: false
  nginx_cache:
    name: arch-nginx-cache
    external: false

networks:
  arch-network:
    name: arch-production
    driver: bridge
    # No static IPAM — let Docker auto-assign to avoid conflicts with
    # existing Docker networks, VPNs, or corporate network ranges.
