# Arch-Mk2 Production Nginx Configuration
# Optimized for: performance, security, reliability

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Maximum open file descriptors
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Basic Settings ──────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;

    # Timeouts
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_body_timeout 30;
    client_header_timeout 30;
    send_timeout 30;

    # Buffer sizes
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_max_body_size 50M;

    # ── MIME Types ──────────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    # Log only 4xx/5xx to error log for noise reduction
    map $status $loggable {
        ~^[23]  0;
        default 1;
    }
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Gzip ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/x-javascript
        image/svg+xml
        image/x-icon;

    # ── Upstreams ───────────────────────────────────────────────────────
    upstream portal_upstream {
        # Least connections for better load distribution
        least_conn;
        server portal:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream api_upstream {
        least_conn;
        server api:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── SSL (when certs are available) ──────────────────────────────────
    # If you have SSL certificates in certs/, uncomment this server block
    # and adjust the paths below. The location blocks from the HTTP server
    # above handle routing — the SSL server adds encryption on top.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_trusted_certificate /etc/nginx/certs/chain.pem;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #     ssl_session_tickets off;
    #
    #     # HSTS (uncomment after verified: !!! this will force HTTPS for 1 year !!!)
    #     # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # Copy the location blocks from the HTTP server below (location /api/, location /, etc.).
    #     # Do NOT use include — all locations must be defined inline.
    # }

    # ── Main Server (HTTP) ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security Headers ──────────────────────────────────────────
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control "no-store" always;

        # ── API Proxy ────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts for API calls
            proxy_connect_timeout 10;
            proxy_send_timeout 30;
            proxy_read_timeout 30;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Remove cache-control from upstream for dynamic API responses
            proxy_hide_header Cache-Control;
            add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
        }

        # ── Portal / Frontend (catch-all) ────────────────────────────
        location / {
            proxy_pass http://portal_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Timeouts for portal (longer for streaming/SSR)
            proxy_connect_timeout 10;
            proxy_send_timeout 60;
            proxy_read_timeout 60;

            # Buffering (disable for streaming pages)
            proxy_buffering off;
            proxy_buffer_size 4k;

        }

        # ── Static assets (top-level — nginx resolves location blocks by prefix,
        #    not by nesting, so this must be outside location / ) ────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|ttf|webp|avif)$ {
            proxy_pass http://portal_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Cache-Control "public, max-age=31536000, immutable" always;
            expires max;
            access_log off;
        }

        # ── WebSocket support (realtime, dev tools) ───────────────────────────
        location = /_next/webpack-hmr {
            proxy_pass http://portal_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # ── Health Check Endpoint ────────────────────────────────────
        location /api/health/ready {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Simple health check, no buffering
            proxy_buffering off;
            access_log off;
            add_header Cache-Control "no-store" always;
        }

        location /api/health/live {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_buffering off;
            access_log off;
            add_header Cache-Control "no-store, no-cache" always;

            # Allow liveness probes
            allow all;
        }

        # ── Deny access to internal endpoints ──────────────────────────
        location ~ /\.(git|env|docker|next) {
            deny all;
            return 404;
        }

        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }

        location = /robots.txt {
            access_log off;
            log_not_found off;
        }
    }
}
